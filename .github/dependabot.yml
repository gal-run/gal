---
# Dependabot - automated dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot
#
# Security updates (the "Dependabot security updates" repo setting) raise fix PRs
# for open alerts. The `groups: applies-to: security-updates` blocks below batch
# those fix PRs (and minor/patch version PRs) so they don't arrive one-at-a-time.
# NOTE: commit-message `prefix` includes "[ci]" so Dependabot's own commits satisfy
# the `require-ci-intent` ruleset (which rejects commits lacking [ci]/[skip ci]).
version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 10
    target-branch: main
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(ci) [ci]"
      include: scope
    groups:
      actions:
        applies-to: version-updates
        patterns: ["*"]

  # npm — the app dirs that currently carry open security alerts
  - package-ecosystem: npm
    directories:
      - "/"
      - "/apps/website"
      - "/packages/gal-code/packages/web"
      - "/tools/demo-studio"
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 10
    target-branch: main
    labels:
      - dependencies
    commit-message:
      prefix: "deps [ci]"
      include: scope
    groups:
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns: ["*"]

  # Go modules — services workspace (open high-severity alerts)
  - package-ecosystem: gomod
    directory: /services
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 10
    target-branch: main
    labels:
      - dependencies
    commit-message:
      prefix: "deps(go) [ci]"
      include: scope
    groups:
      go-security:
        applies-to: security-updates
        patterns: ["*"]
      go-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns: ["*"]
