# Path-filtered CI for the gal monorepo. ubuntu-latest only.
#
# One workflow, per-language jobs gated by dorny/paths-filter so a consumer
# touching one surface doesn't pay for all of them:
#   kernel    <- kernel/**
#   services  <- services/** OR kernel/include/**   (ABI header change is the
#                ONLY intentional cross-lang fan-out: rebuilds Go cgo)
#   ts        <- sdks/** | mcp/** | apps/**          (turbo affected-only)
#   cli       <- cli/**
#   fence     <- ALWAYS (fast license check)
#
# Repo ruleset: every commit message must contain "[ci]".
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      kernel: ${{ steps.filter.outputs.kernel }}
      services: ${{ steps.filter.outputs.services }}
      ts: ${{ steps.filter.outputs.ts }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kernel:
              - 'kernel/**'
            services:
              - 'services/**'
              - 'kernel/include/**'
            ts:
              - 'sdks/**'
              - 'mcp/**'
              - 'apps/**'
            cli:
              - 'cli/**'

  # Always-on, fast license-by-location fence.
  fence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: node tools/check-license-fence.mjs

  kernel:
    needs: changes
    if: ${{ needs.changes.outputs.kernel == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build + ABI conformance
        run: |
          make -C kernel lib
          make -C kernel test

  services:
    needs: changes
    if: ${{ needs.changes.outputs.services == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - name: build kernel lib for cgo
        run: make -C kernel lib
      - name: go build + test
        working-directory: services
        run: |
          go build ./...
          go test ./...

  ts:
    needs: changes
    if: ${{ needs.changes.outputs.ts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - name: turbo affected build + test
        run: |
          npm run build:affected
          npm run test:affected

  cli:
    needs: changes
    if: ${{ needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build + test (default and OSS)
        working-directory: cli
        run: |
          cargo build
          cargo build --no-default-features
          cargo test
