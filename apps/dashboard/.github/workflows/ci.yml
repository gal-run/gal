name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Prevent runaway builds
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GAL_REPO_READ_TOKEN }}
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts --filter gal-dashboard-next --filter @gal/types --filter @gal/telemetry --filter @gal/core --filter @gal/enforce-rules --filter @gal/swarm
        timeout-minutes: 10
      - run: pnpm --filter @gal/types build
        timeout-minutes: 5
      - run: pnpm --filter @gal/telemetry build
        timeout-minutes: 5
      - run: pnpm --filter @gal/core build
        timeout-minutes: 5
      - run: pnpm --filter @gal/enforce-rules build
        timeout-minutes: 5
      - run: pnpm --filter @gal/swarm build
        timeout-minutes: 5
      - run: pnpm build
        timeout-minutes: 10
      - run: pnpm test || true
        timeout-minutes: 10

  # Secrets required in GitHub repository settings:
  #   GAL_REPO_READ_TOKEN          — GitHub PAT (already exists) for private submodule access
  #   GCP_WORKLOAD_IDENTITY_PROVIDER — GCP WIF provider, format:
  #                                    projects/NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
  #   GCP_SERVICE_ACCOUNT          — GCP service account email with Artifact Registry write access
  #   GAL_GITOPS_WRITE_TOKEN       — GitHub PAT with write access to StratusCloudLabs/argocdgitops
  docker-publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Full build + push + gitops update; p95 ~18 min
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GAL_REPO_READ_TOKEN }}
          submodules: recursive

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet
        timeout-minutes: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        timeout-minutes: 20
        with:
          context: .
          push: true
          tags: |
            europe-west4-docker.pkg.dev/gal-run/firebaseapphosting-images/gal-dashboard:latest
            europe-west4-docker.pkg.dev/gal-run/firebaseapphosting-images/gal-dashboard:${{ github.sha }}
          secrets: |
            github_token=${{ secrets.GAL_REPO_READ_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get image digest
        id: digest
        timeout-minutes: 2
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            europe-west4-docker.pkg.dev/gal-run/firebaseapphosting-images/gal-dashboard:${{ github.sha }} \
            --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"

      - name: Check out GitOps repo
        uses: actions/checkout@v4
        with:
          repository: StratusCloudLabs/argocdgitops
          token: ${{ secrets.GAL_GITOPS_WRITE_TOKEN }}
          path: gitops

      - name: Patch image digest in deployment
        timeout-minutes: 2
        run: |
          IMAGE="europe-west4-docker.pkg.dev/gal-run/firebaseapphosting-images/gal-dashboard@${{ steps.digest.outputs.digest }}"
          sed -i "s|image: europe-west4-docker.pkg.dev/gal-run/firebaseapphosting-images/gal-dashboard@sha256:[a-f0-9]*|image: $IMAGE|g" \
            gitops/clusters/stratus/workloads/gal-dashboard/deployment.yaml
          cd gitops
          git config user.name "gal-ci[bot]"
          git config user.email "ci@gal.run"
          git add clusters/stratus/workloads/gal-dashboard/deployment.yaml
          git diff --staged --quiet || git commit -m "[gal-dashboard] deploy ${{ github.sha }}"
          git push
