# ─────────────────────────────────────────────────────────────────────────────
# GAL Dashboard — self-host with Docker Compose
#
#   1. cp .env.example .env   and fill in your values
#   2. docker compose up --build
#   3. open http://localhost:3000
#
# The default build is single-tenant and fully open-source (Apache-2.0). To
# enable the Enterprise surface, set GAL_EE_LICENSE_KEY and
# NEXT_PUBLIC_GAL_EE_LICENSE_KEY in your .env (see src/ee/LICENSE).
#
# NEXT_PUBLIC_* values are baked into the client bundle at BUILD time, so they
# are passed as build args here (not just runtime env).
# ─────────────────────────────────────────────────────────────────────────────
services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-prod}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_GITHUB_APP_SLUG: ${NEXT_PUBLIC_GITHUB_APP_SLUG:-}
        NEXT_PUBLIC_ADMIN_ORGS: ${NEXT_PUBLIC_ADMIN_ORGS:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_GAL_EE_LICENSE_KEY: ${NEXT_PUBLIC_GAL_EE_LICENSE_KEY:-}
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      # Server-side EE license check (route handlers / RSC).
      GAL_EE_LICENSE_KEY: ${GAL_EE_LICENSE_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
