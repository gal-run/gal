<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Consolidation parity over two days</title>
  <desc id="d">Line chart of E1 parity, areas green on both native platforms, out of 27, re-scored after each feature area: 1, 4, 0, 6, 7, 8, 7, 5, 9, 10, 11, 8, 10, 10. Dashed target line at 27. The line is non-monotonic — dips are regressions the eval caught.</desc>
