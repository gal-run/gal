services:
  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: gal-rag-qdrant
    ports:
      - "6333:6333"   # REST API & Web UI
      - "6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
    volumes:
      - qdrant-storage:/x/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: gal-rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gal
      POSTGRES_PASSWORD: gal
      POSTGRES_DB: gal_rag
    volumes:
      - gal-rag-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gal -d gal_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  qdrant-storage:
    driver: local
  gal-rag-pgdata:
    driver: local
